<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARIES Certificate — Innovation System Orchestration for the Creative Industries</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=DM+Mono:wght@300;400;500&family=Archivo:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script>
  // Unregister any stale service workers
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      registrations.forEach(function(r) { r.unregister(); });
    });
  }
</script>
<script>
  // GitHub Pages SPA support: restore path from 404.html redirect
  (function() {
    var q = new URLSearchParams(location.search);
    var p = q.get('p');
    if (p) {
      q.delete('p');
      var remaining = q.toString();
      var url = p + (remaining ? '?' + remaining : '');
      history.replaceState(null, '', url);
    }
  })();
</script>
<script type="module" src="/src/main.tsx"></script>
</body>
</html>
